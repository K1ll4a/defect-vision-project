seed: 42
device: auto
output_dir: runs/defect_faster_rcnn

class_names:
  - __background__
  - crack
  - scratch
  - stain
num_classes: 4

data:
  train_images: data/synthetic/train/images
  train_annotations: data/synthetic/train/annotations.json
  val_images: data/synthetic/val/images
  val_annotations: data/synthetic/val/annotations.json
  test_images: data/synthetic/test/images
  test_annotations: data/synthetic/test/annotations.json
  num_workers: 2

model:
  name: fasterrcnn_resnet50_fpn
  pretrained: true
  trainable_backbone_layers: 3

train:
  epochs: 5
  batch_size: 2
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 3
  lr_gamma: 0.1
  amp: true
  print_freq: 20

eval:
  score_threshold: 0.35
  iou_threshold: 0.5
